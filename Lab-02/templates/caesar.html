<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Caesar Cipher</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
    <div class="container mt-5">
        <table class="table table-bordered">
            <thead class="thead-dark">
                <tr>
                    <th style="text-align: center; font-weight: bold; font-size: 25px;">CAESAR CIPHER</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>
                        <h5 style="font-weight: bold; color: blue;">ENCRYPTION</h5>
                        <form method="POST" action="http://127.0.0.1:5000/api/caesar/encrypt"> 
                            <div class="mb-3">
                                <label class="form-label">Plain text:</label>
                                <input type="text" class="form-control" name="plain_text" placeholder="Input Plain Text" required autofocus>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Key (Shift number):</label>
                                <input type="number" class="form-control" name="key" placeholder="Input Key" required>
                            </div>
                            <button type="submit" class="btn btn-primary">Encrypt</button>
                        </form>
                    </td>
                </tr>

                <tr>
                    <td>
                        <h5 style="font-weight: bold; color: blue;">DECRYPTION</h5>
                        <form method="POST" action="http://127.0.0.1:5000/api/caesar/decrypt"> 
                            <div class="mb-3">
                                <label class="form-label">Cipher text:</label>
                                <input type="text" class="form-control" name="cipher_text" placeholder="Input Cipher Text" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Key (Shift number):</label>
                                <input type="number" class="form-control" name="key" placeholder="Input Key" required>
                            </div>
                            <button type="submit" class="btn btn-primary">Decrypt</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
